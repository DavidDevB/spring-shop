<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
layout:decorate="layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un article</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div layout:fragment="content">
        <div class="col-md-4 col-xs-8">
            <div class="panel panel-primary">
                <div class="panel-heading">Saisir un nouvel article</div>
                <div class="panel-body">
                    <form th:action="@{/save}" method="post">
                        <div class="form-group">
                            <label  class="control-label" for="description">Description</label>
                            <input id="description" name="description" type="text" class="form-control">
                            <span th:errors="${article.description}" class="text-danger"></span>
                        </div>
                        <div class="form-group">
                            <label  class="control-label" for="brand">Marque</label>
                            <input id="brand" name="brand" type="text" class="form-control">
                            <span th:errors="${article.brand}" class="text-danger"></span>
                        </div>
                        <div class="form-group">
                            <label  class="control-label" for="category">Cat&eacute;gorie</label>
                            <select id="category" name="category" class="form-control">
                                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                            </select>
                            <span th:errors="${article.category}" class="text-danger"></span>
                        </div>
                        <div class="form-group">
                            <label  class="control-label" for="price">Prix</label>
                            <input id="price" name="price" type="number" step="0.01" class="form-control">
                            <span th:errors="${article.price}" class="text-danger"></span>
                        </div>
                        <button type="submit" class="btn btn-primary">Ajouter</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
