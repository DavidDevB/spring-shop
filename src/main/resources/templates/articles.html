<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1>Liste des articles</h1>
    <div class="panel-body  ">
        <form th:action="@{/index}" method="get">
            <label for="keyword">keyword: </label>
            <input id="keyword" type="text" name="keyword" th:value="${keyword}"></label>
            <button type="submit" class=""btn btn-primary>Search</button>
        </form>
    </div>
    <table class="table table-striped table-bordered">
        <tr>
            <th>ID</th>
            <th>Marque</th>
            <th>Description</th>
            <th>Prix</th>
            <th>Catégorie</th>
        </tr>
        <tr th:each="article : ${articles}">
            <td th:text="${article.id}"></td>
            <td th:text="${article.brand}"></td>
            <td th:text="${article.description}"></td>
            <td th:text="${article.price}"></td>
            <td th:text="${article.category.name}"></td>
            <td>
                <a th:href="@{/delete(id=${article.id}, page=${currentPage}, keyword=${keyword})}" class="btn btn-danger">Delete</a></a>
            </td>
        </tr>
        
    </table>
    <ul class="pagination">
        <li class="page-item" th:class="${currentPage==status.index}?'active':''" th:each="page,status:${pages}">
            <a class="page-link" th:href="@{/index(page=${status.index}, keyword=${keyword})}" th:text="${status.index}"></a>
        </li>
    </ul>
</div>
</body>
</html>
