<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1>Liste des articles</h1>
    <table class="table table-striped table-bordered">
        <tr>
            <th>ID</th>
            <th>Marque</th>
            <th>Description</th>
            <th>Prix</th>
            <th>Catégorie</th>
        </tr>
        <tr th:each="article : ${articles}">
            <td th:text="${article.id}"></td>
            <td th:text="${article.brand}"></td>
            <td th:text="${article.description}"></td>
            <td th:text="${article.price}"></td>
            <td th:text="${article.category.name}"></td>
        </tr>
        
    </table>
    <ul class="nav nav-pills">
        <li class="nav-item" th:class="${currentPage==status.index}?'active':''" th:each="page,status:${pages}">
            <a class="nav-link" th:href="@{/index(page=${status.index})}" th:text="${status.index}"></a>
        </li>
    </ul>
    
</div>
</body>
</html>
